<body>
<div id="app">

  <!-- TITLE SCREEN -->
  <div id="screen-title" class="screen active">
    <div class="title-content">
      <div class="pokeball-icon">
        <svg viewBox="0 0 100 100" width="80" height="80">
          <circle cx="50" cy="50" r="48" fill="#e74c3c" stroke="#2c3e50" stroke-width="4"/>
          <rect x="2" y="48" width="96" height="4" fill="#2c3e50"/>
          <circle cx="50" cy="50" r="48" fill="none" stroke="#2c3e50" stroke-width="4"/>
          <rect x="2" y="48" width="96" height="4" fill="#2c3e50"/>
          <path d="M2,50 Q50,50 98,50" fill="none"/>
          <circle cx="50" cy="50" r="48" fill="#e74c3c" stroke="#2c3e50" stroke-width="4" clip-path="inset(0 0 50% 0)"/>
          <rect x="2" y="48" width="96" height="4" fill="#2c3e50"/>
          <circle cx="50" cy="50" r="16" fill="white" stroke="#2c3e50" stroke-width="4"/>
          <circle cx="50" cy="50" r="8" fill="#2c3e50"/>
        </svg>
      </div>
      <h1 class="game-title">Покемон Квиз</h1>
      <p class="game-subtitle">Угадай покемона по картинке!</p>
      <input type="text" id="player-name" class="name-input" placeholder="Введи своё имя..." maxlength="20" autocomplete="off">
      <div class="difficulty-selector">
        <button class="diff-btn active" data-diff="easy" onclick="selectDifficulty('easy')">
          <span class="diff-icon">⭐</span>
          <span class="diff-label">Простой</span>
          <span class="diff-desc">3 варианта</span>
        </button>
        <button class="diff-btn" data-diff="hard" onclick="selectDifficulty('hard')">
          <span class="diff-icon">🔥</span>
          <span class="diff-label">Сложный</span>
          <span class="diff-desc">5 вариантов</span>
        </button>
        <button class="diff-btn" data-diff="gen1" onclick="selectDifficulty('gen1')">
          <span class="diff-icon">🏅</span>
          <span class="diff-label">1 Поколение</span>
          <span class="diff-desc">151 покемон</span>
        </button>
      </div>
      <button id="btn-start" class="btn btn-primary btn-large" onclick="startGame()">
        Начать игру
      </button>
      <button class="btn btn-secondary" onclick="showScreen('screen-records')">
        Таблица рекордов
      </button>
    </div>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="screen-quiz" class="screen">
    <div class="quiz-header">
      <div class="progress-info">
        <span id="question-counter">Вопрос 1 / 10</span>
        <span id="score-display">Счёт: 0</span>
      </div>
      <div class="progress-bar">
        <div id="progress-fill" class="progress-fill" style="width: 10%"></div>
      </div>
    </div>
    <div class="quiz-body">
      <button id="btn-cancel" class="btn-cancel" onclick="cancelQuiz()">✕ Отмена</button>
      <div id="pokemon-image-wrapper" class="pokemon-image-wrapper">
        <img id="pokemon-image" src="" alt="Покемон" class="pokemon-image">
        <div id="image-loader" class="image-loader">Загрузка...</div>
      </div>
      <h2 id="quiz-question-label" class="quiz-question">Кто этот покемон?</h2>
      <div id="choices" class="choices"></div>
      <div id="feedback" class="feedback hidden"></div>
      <button id="btn-next" class="btn btn-primary hidden" onclick="nextQuestion()">
        Следующий вопрос
      </button>
    </div>
  </div>

  <!-- RESULT SCREEN -->
  <div id="screen-result" class="screen">
    <div class="name-content">
      <div class="result-summary" id="result-summary"></div>
      <div class="result-actions">
        <button class="btn btn-secondary" onclick="showScreen('screen-title')">
          На главную
        </button>
        <button class="btn btn-primary btn-large" onclick="showScreen('screen-records')">
          Таблица рекордов
        </button>
        <button class="btn btn-secondary" onclick="startGame()">
          Играть снова
        </button>
      </div>
    </div>
  </div>

  <!-- RECORDS SCREEN -->
  <div id="screen-records" class="screen">
    <div class="records-content">
      <h2 class="records-title">Таблица рекордов</h2>
      <div class="records-tabs">
        <button class="records-tab active" data-tab="easy" onclick="switchRecordsTab('easy')">
          ⭐ Простой
        </button>
        <button class="records-tab" data-tab="hard" onclick="switchRecordsTab('hard')">
          🔥 Сложный
        </button>
        <button class="records-tab" data-tab="gen1" onclick="switchRecordsTab('gen1')">
          🏅 Gen 1
        </button>
      </div>
      <div id="records-table-wrapper">
        <table id="records-table" class="records-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Имя</th>
              <th>Счёт</th>
              <th>Время</th>
              <th>Дата</th>
            </tr>
          </thead>
          <tbody id="records-body"></tbody>
        </table>
        <p id="no-records" class="no-records hidden">Пока нет результатов. Будь первым!</p>
      </div>
      <div class="records-actions">
        <button class="btn btn-primary" onclick="showScreen('screen-title')">На главную</button>
        <button class="btn btn-secondary" onclick="startGame()">Играть снова</button>
      </div>
    </div>
  </div>

</div>
